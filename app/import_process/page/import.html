<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库文件导入</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px;
        }
        .container { max-width: 700px; width: 100%; }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 30px; font-size: 24px; }

        /* 上传区域 */
        .upload-area {
            background: #fff; border: 2px dashed #d9d9d9; border-radius: 12px;
            padding: 40px 20px; text-align: center; cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #4096ff; background: #f0f7ff;
        }
        .upload-area .icon { font-size: 48px; color: #4096ff; margin-bottom: 12px; }
        .upload-area .hint { color: #666; font-size: 14px; }
        .upload-area .hint span { color: #4096ff; font-weight: 500; }
        #fileInput { display: none; }

        /* 按钮 */
        .btn-row { display: flex; justify-content: center; margin-top: 20px; gap: 12px; }
        .btn {
            padding: 10px 32px; border: none; border-radius: 8px; font-size: 15px;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-primary { background: #4096ff; color: #fff; }
        .btn-primary:hover { background: #1677ff; }
        .btn-primary:disabled { background: #a0c4ff; cursor: not-allowed; }
        .btn-reset { background: #f5f5f5; color: #666; }
        .btn-reset:hover { background: #e8e8e8; }

        /* 文件列表 */
        .file-list { margin-top: 16px; }
        .file-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; background: #fafafa; border-radius: 6px; margin-bottom: 6px; font-size: 14px;
        }
        .file-item .name { color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 500px; }
        .file-item .remove { color: #ff4d4f; cursor: pointer; font-size: 18px; margin-left: 10px; }

        /* 任务卡片 */
        .task-card {
            background: #fff; border-radius: 12px; padding: 20px; margin-top: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .task-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .task-header .title { font-size: 15px; font-weight: 500; color: #1a1a1a; }
        .task-header .status {
            font-size: 13px; padding: 2px 10px; border-radius: 20px; font-weight: 500;
        }
        .status-processing { background: #fff7e6; color: #d48806; }
        .status-completed { background: #f6ffed; color: #52c41a; }
        .status-failed { background: #fff2f0; color: #ff4d4f; }
        .status-pending { background: #f0f0f0; color: #999; }

        /* 进度条 */
        .progress-bar {
            height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin-bottom: 12px;
        }
        .progress-bar .fill {
            height: 100%; background: #4096ff; border-radius: 3px; transition: width 0.4s;
        }

        /* 导入摘要 */
        .summary-box {
            margin-bottom: 14px; background: #fafcff; border: 1px solid #e6f4ff;
            border-radius: 8px; padding: 12px;
        }
        .summary-title {
            font-size: 13px; font-weight: 600; color: #1677ff; margin-bottom: 10px;
        }
        .summary-empty {
            font-size: 13px; color: #999;
        }
        .summary-grid {
            display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 12px;
        }
        .summary-item {
            background: #fff; border-radius: 6px; padding: 8px 10px; border: 1px solid #f0f0f0;
        }
        .summary-label {
            display: block; font-size: 12px; color: #999; margin-bottom: 4px;
        }
        .summary-value {
            display: block; font-size: 14px; color: #1a1a1a; font-weight: 500;
            word-break: break-all;
        }
        .summary-mono {
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
        }

        /* 日志 */
        .log-toggle {
            font-size: 13px; color: #4096ff; cursor: pointer; user-select: none;
        }
        .log-toggle:hover { text-decoration: underline; }
        .log-content {
            display: none; margin-top: 10px; max-height: 200px; overflow-y: auto;
            background: #fafafa; border-radius: 6px; padding: 10px; font-size: 12px;
            font-family: Consolas, "Courier New", monospace; line-height: 1.8;
        }
        .log-content.show { display: block; }
        .log-entry-done { color: #52c41a; }
        .log-entry-running { color: #d48806; }
        .log-entry-failed { color: #ff4d4f; }

        @media (max-width: 640px) {
            .summary-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>知识库文件导入</h1>

    <!-- 上传区域 -->
    <div class="upload-area" id="uploadArea">
        <div class="icon">📄</div>
        <div class="hint">拖拽文件到此处，或 <span>点击选择文件</span></div>
        <div class="hint" style="margin-top:6px; color:#999;">支持 PDF / MD 格式，可多选</div>
    </div>
    <input type="file" id="fileInput" multiple accept=".pdf,.md">

    <!-- 文件列表 -->
    <div class="file-list" id="fileList"></div>

    <div style="margin-top: 14px;">
        <div class="hint" style="margin-bottom: 6px; color:#666;">
            业务文档 ID（可选，一行对应一个文件；填写后会优先作为增量同步的文档标识）
        </div>
        <textarea
                id="externalDocIdsInput"
                style="width: 100%; min-height: 88px; border: 1px solid #d9d9d9; border-radius: 8px; padding: 10px 12px; font-size: 14px; resize: vertical;"
                placeholder="例如：&#10;manual-hak180-v1&#10;manual-hl3040-v2"
        ></textarea>
    </div>

    <!-- 操作按钮 -->
    <div class="btn-row">
        <button class="btn btn-primary" id="uploadBtn" disabled>开始上传</button>
        <button class="btn btn-reset" id="resetBtn">重置</button>
    </div>

    <!-- 任务列表 -->
    <div id="taskList"></div>
</div>

<script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileListEl = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const taskListEl = document.getElementById('taskList');
    const externalDocIdsInput = document.getElementById('externalDocIdsInput');

    let selectedFiles = [];
    let pollTimers = {};

    // ========== 拖拽与选择 ==========
    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    function handleFiles(files) {
        for (const f of files) {
            const ext = f.name.split('.').pop().toLowerCase();
            if (!['pdf', 'md'].includes(ext)) {
                alert(`不支持的文件格式：${f.name}，仅支持 PDF/MD`);
                continue;
            }
            // 去重
            if (!selectedFiles.find(sf => sf.name === f.name && sf.size === f.size)) {
                selectedFiles.push(f);
            }
        }
        renderFileList();
        uploadBtn.disabled = selectedFiles.length === 0;
        // 清空input，允许重复选择同名文件
        fileInput.value = '';
    }

    function renderFileList() {
        fileListEl.innerHTML = selectedFiles.map((f, i) => `
            <div class="file-item">
                <span class="name">${f.name}（${(f.size / 1024).toFixed(1)} KB）</span>
                <span class="remove" onclick="removeFile(${i})">✕</span>
            </div>
        `).join('');
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        renderFileList();
        uploadBtn.disabled = selectedFiles.length === 0;
    }

    // ========== 上传 ==========
    uploadBtn.addEventListener('click', async () => {
        if (selectedFiles.length === 0) return;
        uploadBtn.disabled = true;

        const formData = new FormData();
        selectedFiles.forEach(f => formData.append('files', f));
        const externalDocIds = externalDocIdsInput.value
            .split(/\r?\n/)
            .map(item => item.trim())
            .filter(item => item.length > 0);

        if (externalDocIds.length > 0 && externalDocIds.length !== selectedFiles.length) {
            alert('业务文档 ID 数量必须和上传文件数量一致');
            uploadBtn.disabled = false;
            return;
        }

        externalDocIds.forEach(value => formData.append('external_doc_ids', value));

        try {
            const resp = await fetch('/upload', { method: 'POST', body: formData });
            const result = await resp.json();

            if (result.code === 200 && result.task_ids) {
                result.task_ids.forEach(taskId => {
                    createTaskCard(taskId);
                    startPolling(taskId);
                });
            } else {
                alert('上传失败：' + (result.message || '未知错误'));
                uploadBtn.disabled = false;
            }
        } catch (err) {
            alert('上传请求失败：' + err.message);
            uploadBtn.disabled = false;
        }
    });

    // ========== 重置 ==========
    resetBtn.addEventListener('click', () => {
        selectedFiles = [];
        renderFileList();
        uploadBtn.disabled = true;
        fileInput.value = '';
        externalDocIdsInput.value = '';
        // 停止所有轮询
        Object.values(pollTimers).forEach(clearInterval);
        pollTimers = {};
        taskListEl.innerHTML = '';
    });

    // ========== 任务卡片 ==========
    function createTaskCard(taskId) {
        const card = document.createElement('div');
        card.className = 'task-card';
        card.id = `task-${taskId}`;
        card.innerHTML = `
            <div class="task-header">
                <span class="title">任务：${taskId.substring(0, 8)}...</span>
                <span class="status status-pending" id="status-${taskId}">等待中</span>
            </div>
            <div class="progress-bar"><div class="fill" id="progress-${taskId}" style="width:0%"></div></div>
            <div class="summary-box">
                <div class="summary-title">导入摘要</div>
                <div class="summary-empty" id="summary-${taskId}">等待导入结果...</div>
            </div>
            <div class="log-toggle" onclick="toggleLog('${taskId}')">日志（点击展开）</div>
            <div class="log-content" id="log-${taskId}"></div>
        `;
        taskListEl.appendChild(card);
    }

    function toggleLog(taskId) {
        const logEl = document.getElementById(`log-${taskId}`);
        logEl.classList.toggle('show');
    }

    // ========== 轮询状态 ==========
    function startPolling(taskId) {
        // 总节点数（用于进度计算）
        const totalNodes = 7;

        const timer = setInterval(async () => {
            try {
                const resp = await fetch(`/status/${taskId}`);
                const data = await resp.json();

                // 更新状态标签
                const statusEl = document.getElementById(`status-${taskId}`);
                statusEl.className = 'status';
                if (data.status === 'processing') {
                    statusEl.classList.add('status-processing');
                    statusEl.textContent = '处理中...';
                } else if (data.status === 'completed') {
                    statusEl.classList.add('status-completed');
                    statusEl.textContent = '已完成';
                    clearInterval(timer);
                    delete pollTimers[taskId];
                } else if (data.status === 'failed') {
                    statusEl.classList.add('status-failed');
                    statusEl.textContent = '失败';
                    clearInterval(timer);
                    delete pollTimers[taskId];
                } else {
                    statusEl.classList.add('status-pending');
                    statusEl.textContent = '等待中';
                }

                // 更新进度条
                const doneCount = (data.done_list || []).length;
                const percent = Math.min(Math.round((doneCount / totalNodes) * 100), 100);
                document.getElementById(`progress-${taskId}`).style.width = percent + '%';

                // 更新导入摘要
                renderImportSummary(taskId, data);

                // 更新日志
                const logEl = document.getElementById(`log-${taskId}`);
                const doneList = data.done_list || [];
                const runningList = data.running_list || [];
                let logHtml = '';

                doneList.forEach(node => {
                    logHtml += `<div class="log-entry-done">✅ ${escapeHtml(String(node))} 已完成</div>`;
                });
                runningList.forEach(node => {
                    logHtml += `<div class="log-entry-running">⏳ ${escapeHtml(String(node))} 进行中...</div>`;
                });
                if (data.status === 'failed') {
                    const errorText = data.error ? escapeHtml(String(data.error)) : '任务执行失败';
                    logHtml += `<div class="log-entry-failed">❌ ${errorText}</div>`;
                }

                logEl.innerHTML = logHtml;

            } catch (err) {
                console.error(`轮询任务 ${taskId} 状态失败：`, err);
            }
        }, 2000);

        pollTimers[taskId] = timer;
    }

    function renderImportSummary(taskId, data) {
        const summaryEl = document.getElementById(`summary-${taskId}`);
        const summary = data.import_summary || {};
        const hasSummary = Object.keys(summary).length > 0;

        if (!hasSummary) {
            const waitingText = data.status === 'failed'
                ? `任务失败${data.error ? `：${data.error}` : ''}`
                : '等待导入结果...';
            summaryEl.className = 'summary-empty';
            summaryEl.textContent = waitingText;
            return;
        }

        const rows = [
            { label: '本次动作', value: formatAction(summary.action) },
            { label: '业务文档 ID', value: data.external_doc_id || summary.external_doc_id || '-' },
            { label: '主体名称', value: data.item_name || summary.item_name || '-' },
            { label: '切片变化', value: `新增 ${summary.added_count || 0} / 更新 ${summary.updated_count || 0} / 删除 ${summary.deleted_count || 0} / 未变 ${summary.unchanged_count || 0}` },
            { label: '向量处理', value: `重算 ${summary.embedding_recompute_count || 0} / 跳过 ${summary.embedding_skipped_count || 0}` },
            { label: 'Milvus 变更', value: `写入 ${summary.milvus_upsert_count || 0} / 删除 ${summary.milvus_delete_count || 0}` },
            { label: '跳过原因', value: formatSkipReason(summary.skip_reason) || '无' },
            { label: '文档版本', value: summary.doc_version || '-', mono: true },
            { label: '文档标识', value: summary.doc_id || '-', mono: true },
        ];

        summaryEl.className = 'summary-grid';
        summaryEl.innerHTML = rows.map(row => `
            <div class="summary-item">
                <span class="summary-label">${escapeHtml(String(row.label))}</span>
                <span class="summary-value${row.mono ? ' summary-mono' : ''}">${escapeHtml(String(row.value))}</span>
            </div>
        `).join('');
    }

    function formatAction(action) {
        const actionMap = {
            incremental_upsert: '增量写入',
            skip_document: '文档级跳过',
            skip_chunks: '切片级跳过',
            delete_only: '仅删除旧切片',
            noop: '无变更'
        };
        return actionMap[action] || action || '-';
    }

    function formatSkipReason(skipReason) {
        const reasonMap = {
            source_hash_unchanged: '文档内容未变化',
            chunk_diff_unchanged: '切片结果未变化'
        };
        return reasonMap[skipReason] || skipReason || '';
    }

    function escapeHtml(value) {
        return value
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }
</script>
</body>
</html>
